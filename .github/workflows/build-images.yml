name: Build Scion Images

on:
  workflow_dispatch:
    inputs:
      registry:
        description: 'Container registry (e.g., ghcr.io/myorg)'
        required: true
        default: 'ghcr.io/berdinal'
      target:
        description: 'Build target'
        type: choice
        options:
          - common
          - all
          - core-base
          - harnesses
        default: 'common'
      tag:
        description: 'Image tag'
        default: 'latest'
      platform:
        description: 'Target platform(s)'
        type: choice
        options:
          - all
          - linux/amd64
          - linux/arm64
        default: 'linux/amd64'

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build and Push Images
    runs-on: ubuntu-latest
    steps:
      - name: Check out SCION source (for build scripts)
        uses: actions/checkout@v4
        with:
          repository: GoogleCloudPlatform/scion
          path: scion-src

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: startsWith(inputs.registry, 'ghcr.io')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push images
        working-directory: scion-src
        run: |
          image-build/scripts/build-images.sh \
            --registry "${{ inputs.registry }}" \
            --target "${{ inputs.target }}" \
            --tag "${{ inputs.tag }}" \
            --platform "${{ inputs.platform }}" \
            --push
